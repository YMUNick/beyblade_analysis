<!--
  BEY SCAN X — 戰鬥陀螺天梯查詢
  搜尋戰刃 → 對照台灣天梯 → 顯示階級 / 原裝配件 / 建議配置
  天梯資料源：@stan_yao / stan-yao.github.io/beyblade_x_tier
  資料為快照，非官方粉絲工具，僅供參考。
-->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>BEY SCAN X ｜ 戰鬥陀螺天梯查詢</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#07080d; --bg2:#0c0e16; --panel:#12141f; --panel2:#171a27;
    --line:rgba(255,255,255,.09); --line2:rgba(255,255,255,.16);
    --text:#eaf1f6; --muted:#8a94a6; --dim:#5a6272;
    --accent:#12efce; --accent2:#0bd0f0;
    --atk:#ff3b46; --def:#3d7bff; --sta:#22d36b; --bal:#b76bff; --spc:#ff6bd6;
    --tS:#ffcf3a; --tA:#12efce; --tB:#6ea8ff; --tC:#b7c0cc; --tD:#7a8594; --tX:#ff6bd6;
    --shadow:0 20px 60px rgba(0,0,0,.55);
    --clip:polygon(0 0,100% 0,100% calc(100% - 14px),calc(100% - 14px) 100%,0 100%);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--text);
    font-family:"Noto Sans TC",system-ui,sans-serif;-webkit-font-smoothing:antialiased;
    scroll-behavior:smooth}
  body{
    min-height:100vh;overflow-x:hidden;position:relative;
    background:
      radial-gradient(1200px 600px at 80% -10%,rgba(18,239,206,.10),transparent 60%),
      radial-gradient(900px 500px at -10% 20%,rgba(255,59,70,.08),transparent 55%),
      linear-gradient(180deg,var(--bg),var(--bg2) 40%,var(--bg));
  }
  body::before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.5;z-index:0;
    background:repeating-linear-gradient(115deg,transparent 0 38px,rgba(255,255,255,.012) 38px 39px);}
  .wrap{max-width:1040px;margin:0 auto;padding:0 18px 90px;position:relative;z-index:1}
  ::selection{background:var(--accent);color:#04121a}

  /* ── top bar ── */
  .top{display:flex;align-items:center;gap:12px;padding:22px 4px 10px;position:relative}
  .top::after{content:"";position:absolute;left:4px;right:4px;bottom:0;height:2px;
    background:linear-gradient(90deg,var(--accent),transparent 70%)}
  .mark{position:relative;font-family:"Orbitron";font-weight:900;font-size:1.28rem;
    letter-spacing:.06em;line-height:1;display:flex;align-items:center;gap:2px}
  .mark .x{color:var(--bg);background:linear-gradient(150deg,var(--accent),var(--accent2));
    padding:3px 8px 4px;margin-left:4px;transform:skewX(-9deg);
    box-shadow:0 0 18px rgba(18,239,206,.45)}
  .mark .x span{display:inline-block;transform:skewX(9deg)}
  .tagline{font-family:"Orbitron";font-size:.56rem;letter-spacing:.32em;color:var(--muted);
    margin-left:auto;text-transform:uppercase;white-space:nowrap}

  /* ── hero ── */
  .hero{padding:30px 0 8px;text-align:center}
  .hero h1{font-family:"Orbitron";font-weight:900;line-height:1.02;
    font-size:clamp(2.1rem,8vw,3.5rem);letter-spacing:.01em}
  .hero h1 .grad{background:linear-gradient(100deg,#fff 10%,var(--accent) 55%,var(--accent2));
    -webkit-background-clip:text;background-clip:text;color:transparent}
  .hero .sub{color:var(--muted);margin-top:14px;font-size:.98rem;line-height:1.7;font-weight:500}
  .hero .sub b{color:var(--text);font-weight:700}

  /* ── search ── */
  .searchbox{margin-top:26px;position:relative}
  .searchbox svg{position:absolute;left:18px;top:50%;transform:translateY(-50%);
    width:20px;height:20px;color:var(--accent);pointer-events:none}
  #search{width:100%;padding:18px 18px 18px 50px;font-size:1rem;color:var(--text);
    font-family:"Noto Sans TC",sans-serif;background:linear-gradient(160deg,var(--panel2),var(--panel));
    border:1px solid var(--line2);clip-path:var(--clip);outline:none;transition:border-color .2s}
  #search::placeholder{color:var(--dim)}
  #search:focus{border-color:var(--accent)}
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
  .chip{font-family:"Orbitron";font-size:.66rem;letter-spacing:.08em;padding:8px 14px;
    border:1px solid var(--line2);color:var(--muted);background:rgba(255,255,255,.02);
    cursor:pointer;transition:.15s;clip-path:polygon(0 0,100% 0,100% 100%,6px 100%,0 calc(100% - 6px))}
  .chip:hover{color:var(--text);border-color:var(--line2)}
  .chip.on{color:#04121a;background:var(--accent);border-color:var(--accent);font-weight:700}
  .count{margin-top:14px;font-family:"Orbitron";font-size:.66rem;letter-spacing:.14em;
    color:var(--dim)}

  /* ── tabs ── */
  .tabs{display:flex;gap:10px;margin-top:26px}
  .tab{flex:1;font-family:"Orbitron";font-weight:700;font-size:.8rem;letter-spacing:.06em;
    padding:14px 12px;cursor:pointer;color:var(--muted);border:1px solid var(--line2);
    background:linear-gradient(160deg,var(--panel2),var(--panel));
    clip-path:polygon(0 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%);
    transition:.15s}
  .tab:hover{color:var(--text)}
  .tab.on{color:#04121a;background:linear-gradient(100deg,var(--accent),var(--accent2));
    border-color:var(--accent);box-shadow:0 8px 26px rgba(18,239,206,.25)}
  .tab #favCount{opacity:.85}

  /* ── favorite form (in detail) ── */
  .fav-field{margin-bottom:12px}
  .fav-field label{display:block;font-family:"Orbitron";font-size:.56rem;letter-spacing:.12em;
    color:var(--dim);margin-bottom:6px}
  .fav-field input,.fav-field textarea{width:100%;padding:11px 13px;font-size:.9rem;color:var(--text);
    font-family:"Noto Sans TC",sans-serif;background:rgba(255,255,255,.03);
    border:1px solid var(--line2);outline:none;transition:border-color .2s;resize:vertical}
  .fav-field input:focus,.fav-field textarea:focus{border-color:var(--accent)}
  .fav-save{width:100%;margin-top:6px}
  .fav-msg{text-align:center;font-family:"Orbitron";font-size:.68rem;letter-spacing:.1em;
    color:var(--sta);margin-top:12px;min-height:16px}

  /* ── favorite card (in favorites view) ── */
  .fc{background:linear-gradient(160deg,var(--panel2),var(--panel));border:1px solid var(--line);
    clip-path:polygon(0 0,100% 0,100% calc(100% - 12px),calc(100% - 12px) 100%,0 100%);
    overflow:hidden;display:flex;flex-direction:column}
  .fc .fc-img{background:#05060a;display:flex;align-items:center;justify-content:center;
    overflow:hidden;border-bottom:1px solid var(--line);padding:8px;min-height:120px}
  .fc .fc-img img{width:100%;height:auto;max-height:300px;object-fit:contain;display:block}
  .fc .fc-body{padding:14px;flex:1;display:flex;flex-direction:column}
  .fc .fc-nick{font-weight:700;font-size:1rem;line-height:1.2}
  .fc .fc-blade{font-size:.74rem;color:var(--muted);margin-top:4px}
  .fc .fc-tags{display:flex;gap:6px;margin-top:10px;align-items:center;flex-wrap:wrap}
  .fc .fc-note{font-size:.82rem;color:#cdd6df;line-height:1.5;margin-top:10px;
    white-space:pre-wrap;word-break:break-word}
  .fc .fc-date{font-family:"Orbitron";font-size:.54rem;letter-spacing:.1em;color:var(--dim);margin-top:10px}
  .fc .fc-actions{display:flex;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--line)}
  .fc .fc-actions button{flex:1;font-family:"Orbitron";font-size:.66rem;letter-spacing:.06em;
    padding:9px 6px;cursor:pointer;border:1px solid var(--line2);background:transparent;
    color:var(--muted);transition:.15s}
  .fc .fc-actions button:hover{color:var(--text);border-color:var(--accent)}
  .fc .fc-actions button.del:hover{color:var(--atk);border-color:var(--atk)}

  /* ── results grid ── */
  .results{margin-top:14px;display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
  .rc{display:flex;gap:12px;align-items:center;padding:12px;cursor:pointer;
    background:linear-gradient(160deg,var(--panel2),var(--panel));border:1px solid var(--line);
    clip-path:polygon(0 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%);
    transition:transform .12s,border-color .2s}
  .rc:hover{transform:translateY(-2px);border-color:var(--accent)}
  .rc .thumb{flex:0 0 auto;width:84px;height:84px;border-radius:8px;overflow:hidden;
    background:#05060a;display:grid;place-items:center}
  .rc .thumb img{width:100%;height:100%;object-fit:contain}
  .rc .rc-body{min-width:0;flex:1}
  .rc .rc-name{font-weight:700;font-size:.92rem;line-height:1.2;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rc .rc-id{font-family:"Orbitron";font-size:.56rem;letter-spacing:.1em;color:var(--dim);margin-top:3px}
  .rc .rc-tags{display:flex;gap:6px;margin-top:8px;align-items:center}
  .tbadge{font-family:"Orbitron";font-size:.56rem;font-weight:700;letter-spacing:.06em;
    padding:3px 7px;color:#06090f}
  .tierpill{font-family:"Orbitron";font-size:.6rem;font-weight:900;letter-spacing:.04em;
    padding:2px 8px;border:1.5px solid currentColor}
  .empty{margin-top:24px;text-align:center;color:var(--dim);font-size:.9rem;line-height:1.8;
    padding:30px 20px;border:1px dashed var(--line2);clip-path:var(--clip)}

  /* ── 配件天梯（固鎖 / 軸心） ── */
  .pgroup{margin-top:22px}
  .pg-head{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;
    padding:8px 12px;border-left:4px solid var(--gc);
    background:linear-gradient(100deg,color-mix(in srgb,var(--gc) 14%,transparent),transparent 70%)}
  .pg-title{font-family:"Orbitron";font-weight:800;font-size:.9rem;letter-spacing:.06em;color:var(--gc)}
  .pg-desc{font-size:.72rem;color:var(--muted);line-height:1.4}
  .pg-buy{--gc:var(--sta)} .pg-maybe{--gc:var(--tS)} .pg-avoid{--gc:var(--atk)}
  .pc{padding:13px 14px;background:linear-gradient(160deg,var(--panel2),var(--panel));
    border:1px solid var(--line);clip-path:polygon(0 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%)}
  .pc-head{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .pc-name{font-family:"Orbitron";font-weight:800;font-size:1.05rem;letter-spacing:.04em;color:var(--text)}
  .pc-hint{font-size:.74rem;color:var(--accent);margin-top:7px;line-height:1.4}
  .pc-note{font-size:.8rem;color:var(--muted);margin-top:6px;line-height:1.55}
  .pc-count{font-family:"Orbitron";font-size:.54rem;letter-spacing:.1em;color:var(--dim);margin-top:8px}

  /* ── detail modal（彈出視窗） ── */
  .detail{display:none;position:fixed;inset:0;z-index:50;
    background:rgba(3,4,8,.74);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
    padding:26px 16px;overflow-y:auto;animation:fade .22s ease both}
  .detail.show{display:flex;align-items:flex-start;justify-content:center}
  body.modal-open{overflow:hidden}
  .modal-box{position:relative;width:100%;max-width:720px;margin:auto;
    animation:rise .32s ease both}
  .modal-close{position:absolute;top:-8px;right:-8px;z-index:3;
    width:42px;height:42px;display:grid;place-items:center;cursor:pointer;
    font-family:"Orbitron";font-size:1.05rem;color:var(--text);line-height:1;
    background:var(--panel2);border:1px solid var(--line2);border-radius:50%;
    box-shadow:0 6px 20px rgba(0,0,0,.5);transition:.15s}
  .modal-close:hover{color:var(--atk);border-color:var(--atk);transform:rotate(90deg)}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  @keyframes rise{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}

  /* 建議清單 */
  .suggest{list-style:none;display:flex;flex-direction:column;gap:10px;margin-top:6px}
  .suggest li{position:relative;padding:12px 15px 12px 34px;font-size:.9rem;line-height:1.65;
    color:#dbe4ec;border:1px solid var(--line);background:rgba(255,255,255,.02)}
  .suggest li::before{content:"▸";position:absolute;left:14px;top:12px;color:var(--accent);
    font-weight:900}
  .card{background:linear-gradient(165deg,var(--panel2),var(--panel));
    border:1px solid var(--line);clip-path:var(--clip);overflow:hidden;box-shadow:var(--shadow)}
  .card-hero{position:relative;display:flex;gap:18px;padding:22px 20px;
    background:linear-gradient(120deg,rgba(18,239,206,.10),transparent 55%);
    border-bottom:1px solid var(--line);flex-wrap:wrap}
  .card-hero .pic{flex:0 0 auto;width:195px;height:195px;background:#05060a;
    border:1px solid var(--line2);display:grid;place-items:center;overflow:hidden;
    clip-path:polygon(0 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%)}
  .card-hero .pic img{width:100%;height:100%;object-fit:contain}
  .card-hero .meta{flex:1;min-width:200px}
  .scan-tag{position:absolute;top:16px;right:18px;font-family:"Orbitron";font-size:.56rem;
    letter-spacing:.2em;color:var(--accent);display:flex;align-items:center;gap:6px}
  .scan-tag::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--accent);
    box-shadow:0 0 8px var(--accent)}
  .r-kicker{font-family:"Orbitron";font-size:.6rem;letter-spacing:.24em;color:var(--muted)}
  .r-name{font-family:"Orbitron";font-weight:900;font-size:clamp(1.5rem,6vw,2.1rem);
    line-height:1.05;margin-top:8px}
  .r-id{color:var(--muted);font-size:.74rem;font-weight:500;margin-top:6px;
    letter-spacing:.04em;font-family:"Orbitron"}
  .r-badges{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
  .bigbadge{display:flex;flex-direction:column;align-items:center;gap:6px}
  .bigbadge .hex{width:56px;height:56px;display:grid;place-items:center;
    clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%);
    font-family:"Orbitron";font-weight:900;font-size:1.3rem;color:#06090f}
  .bigbadge .tt{width:56px;height:56px;display:grid;place-items:center;
    font-family:"Orbitron";font-weight:900;font-size:1.5rem;
    border:2px solid currentColor;clip-path:var(--clip)}
  .bigbadge .lbl{font-family:"Orbitron";font-size:.56rem;letter-spacing:.14em;color:var(--muted)}

  .block{padding:20px}
  .block h4{font-family:"Orbitron";font-size:.64rem;letter-spacing:.2em;
    color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:10px}
  .block h4::after{content:"";flex:1;height:1px;background:var(--line)}
  .verdict{font-size:.95rem;line-height:1.85;color:#dbe4ec;
    padding:14px 16px;border-left:3px solid var(--accent);background:rgba(18,239,206,.05)}
  .parts{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:6px}
  @media(max-width:520px){.parts{grid-template-columns:1fr}}
  .partcard{border:1px solid var(--line);background:rgba(255,255,255,.02);padding:13px 15px}
  .partcard .pk{font-family:"Orbitron";font-size:.56rem;letter-spacing:.12em;color:var(--dim)}
  .partcard .pv{font-weight:700;font-size:1rem;margin-top:6px;display:flex;align-items:center;gap:9px}
  .partcard .pv .pt{font-family:"Orbitron";font-size:.62rem;font-weight:900;
    padding:2px 8px;border:1.5px solid currentColor}
  .combo{display:flex;align-items:center;gap:12px;padding:13px 15px;
    border:1px solid var(--line);background:rgba(255,255,255,.02);font-size:.9rem;line-height:1.5}
  .combo .cn{font-family:"Orbitron";font-size:.7rem;color:var(--accent);flex:0 0 auto;
    width:26px;height:26px;display:grid;place-items:center;border:1px solid rgba(18,239,206,.4)}
  .srcline{font-size:.82rem;color:var(--muted);margin-top:14px}
  .srcline b{color:var(--text);font-weight:700}

  /* photo (personal record) */
  .photo-sec{border-top:1px solid var(--line);padding:20px}
  .drop{padding:26px 20px;text-align:center;cursor:pointer;border:1px dashed var(--line2);
    background:rgba(255,255,255,.015);transition:background .2s;
    clip-path:polygon(0 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%)}
  .drop:hover,.drop.drag{background:rgba(18,239,206,.05)}
  .drop:focus-visible{outline:2px solid var(--accent);outline-offset:3px}
  .drop .di{font-family:"Orbitron";font-weight:700;font-size:.86rem;letter-spacing:.04em}
  .drop .dp{color:var(--muted);font-size:.76rem;margin-top:7px}
  .drop .fmt{color:var(--dim);font-size:.64rem;margin-top:9px;font-family:"Orbitron";letter-spacing:.14em}
  .userphoto{display:none;margin-top:14px}
  .userphoto.show{display:block}
  .userphoto .pf{position:relative;border:1px solid var(--line2);overflow:hidden;background:#000;
    clip-path:polygon(0 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%)}
  .userphoto .pf img{display:block;width:100%;max-height:300px;object-fit:contain;background:#05060a}
  .btn{font-family:"Orbitron";font-weight:700;letter-spacing:.08em;border:0;cursor:pointer;
    padding:13px 22px;font-size:.82rem;color:#04121a;
    background:linear-gradient(100deg,var(--accent),var(--accent2));
    clip-path:polygon(0 0,100% 0,100% 100%,10px 100%,0 calc(100% - 10px));
    transition:transform .12s,box-shadow .2s;box-shadow:0 8px 26px rgba(18,239,206,.28)}
  .btn:hover{transform:translateY(-2px);box-shadow:0 12px 34px rgba(18,239,206,.42)}
  .btn.ghost{background:transparent;color:var(--text);border:1px solid var(--line2);box-shadow:none}
  .btn.ghost:hover{border-color:var(--accent);color:var(--accent)}
  .photo-actions{display:flex;gap:10px;margin-top:12px}

  .again{margin-top:20px;text-align:center}

  /* footer */
  .foot{margin-top:44px;padding-top:20px;border-top:1px solid var(--line);text-align:center;
    color:var(--dim);font-size:.74rem;line-height:1.9}
  .foot a{color:var(--muted);text-decoration:none;border-bottom:1px solid var(--line2)}
  .foot a:hover{color:var(--accent)}
  .foot .db{display:inline-flex;align-items:center;gap:8px;font-family:"Orbitron";
    font-size:.6rem;letter-spacing:.16em;padding:5px 11px;border:1px solid var(--line);margin-top:10px}
  .foot .db i{width:6px;height:6px;border-radius:50%;background:var(--sta);box-shadow:0 0 8px var(--sta)}

  /* ══ 響應式架構 ══ */
  /* 桌機寬螢幕：清單/收藏可排更多欄（wrap 已 1040px） */
  @media(min-width:1000px){
    .results{grid-template-columns:repeat(auto-fill,minmax(230px,1fr))}
  }
  /* 平板 */
  @media(max-width:820px){
    .wrap{padding:0 16px 80px}
    .card-hero .pic{width:170px;height:170px}
  }
  /* 手機 */
  @media(max-width:600px){
    .wrap{padding:0 14px 72px}
    .hero{padding:22px 0 6px}
    .hero .sub{font-size:.9rem}
    .tabs{gap:8px;margin-top:20px}
    .tab{font-size:.72rem;padding:12px 8px}
    .results{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
    /* 搜尋結果卡改直向堆疊，縮圖放大更好按 */
    .rc{flex-direction:column;text-align:center;gap:8px;padding:12px 10px}
    .rc .thumb{width:100%;height:110px}
    .rc .rc-name{white-space:normal}
    .rc .rc-tags{justify-content:center}
    /* 詳細卡：圖置頂置中 */
    .card-hero{flex-direction:column;align-items:center;text-align:center;padding:20px 16px}
    .card-hero .meta{min-width:0;width:100%}
    .r-badges{justify-content:center}
    .scan-tag{position:static;justify-content:center;margin-bottom:10px}
    .block,.photo-sec{padding:16px}
    .parts{grid-template-columns:1fr}
    .fc .fc-img img{max-height:240px}
    /* 彈窗手機版：貼齊邊、關閉鈕移入卡內 */
    .detail{padding:14px 10px}
    .modal-close{top:6px;right:6px;width:38px;height:38px}
  }
  /* 小型手機 */
  @media(max-width:380px){
    .results{grid-template-columns:1fr}
  }

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.001ms!important;transition-duration:.1ms!important}
  }
</style>

<div class="wrap">
  <div class="top">
    <div class="mark">BEY&nbsp;SCAN<span class="x"><span>X</span></span></div>
    <div class="tagline">戰刃辨識 · 天梯戰力</div>

/* ── 對照表 ── */
const TYPE = {
  attack:  {zh:"攻擊", ini:"攻", color:"var(--atk)", trait:"主打撞擊爆發，正面壓制"},
  defense: {zh:"防禦", ini:"防", color:"var(--def)", trait:"耐撞抗攻，穩守反擊"},
  stamina: {zh:"持久", ini:"久", color:"var(--sta)", trait:"低耗轉久，比生存耐力"},
  balance: {zh:"平衡", ini:"衡", color:"var(--bal)", trait:"攻守兼備，泛用性高"},
  special: {zh:"特殊", ini:"特", color:"var(--spc)", trait:"特殊機制／限定款"},
};
const DEF_TYPE = {zh:"未分類", ini:"?", color:"var(--dim)", trait:"天梯尚未分類"};
function typeInfo(t){ return TYPE[t] || DEF_TYPE; }

// 階級排序權重（高→低）：X 最高，接著 S+ / S …，最後未列
const TIER_RANK = {"X":15,"S+":14,"S":13,"A+":12,"A":11,"B+":10,"B":9,"C+":8,"C":7,
  "D+":6,"D":5,"E+":4,"E":3,"-":-1,"":-1};
function tierRank(t){ return (t in TIER_RANK) ? TIER_RANK[t] : 0; }
function tierColor(t){
  const c=(t||"").replace("+","");
  if(c==="S")return "var(--tS)"; if(c==="A")return "var(--tA)";
  if(c==="B")return "var(--tB)"; if(c==="C")return "var(--tC)";
  if(c==="D"||c==="E")return "var(--tD)"; if(c==="X")return "var(--tX)";
  return "var(--dim)";
}
function tierLabel(t){ return (!t||t==="-") ? "未列" : t; }
function partTierColor(t){ return tierColor(t); }

const esc=s=>String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

const FILTERS=[["all","全部"],["attack","攻擊"],["defense","防禦"],

filtersEl.querySelectorAll(".chip").forEach(ch=>ch.addEventListener("click",()=>{

  ch.classList.add("on"); activeType=ch.dataset.t; render();
}));

dbText.textContent="天梯資料快照 · "+BLADES.length+" 款戰刃 · "+SNAPSHOT_DATE;

/* ── 搜尋 / 渲染清單 ── */
searchEl.addEventListener("input",render);

function matches(){
  const q=searchEl.value.trim().toLowerCase();
  let list=BLADES.filter(b=>{
    if(activeType!=="all" && b.type!==activeType) return false;
    if(!q) return true;
    return (b.name||"").toLowerCase().includes(q) || (b.id||"").toLowerCase().includes(q);
  });
  list.sort((a,b)=> tierRank(b.tier)-tierRank(a.tier) || a.name.localeCompare(b.name,"zh-Hant"));
  return list;
}

function render(){
  const list=matches();
  const q=searchEl.value.trim();
  countEl.textContent = list.length+" 款符合" + (q?`（關鍵字「${q}」）`:activeType!=="all"?"":" · 依天梯排序");
  if(!list.length){
    resultsEl.innerHTML="";
    emptyEl.style.display="block";
    emptyEl.innerHTML="找不到符合的戰刃。<br>試試輸入中文名（如「龍劍」）或型號（如「BX-34」）。";
    return;
  }
  emptyEl.style.display="none";
  resultsEl.innerHTML=list.map(b=>{
    const ti=typeInfo(b.type), tc=tierColor(b.tier);
    const idx=BLADES.indexOf(b);
    return `<div class="rc" data-i="${idx}" role="button" tabindex="0">
      <div class="thumb">${b.img?`<img src="${esc(b.img)}" alt="" loading="lazy">`:""}</div>
      <div class="rc-body">
        <div class="rc-name">${esc(b.name)}</div>
        <div class="rc-id">${esc(b.id||"")}</div>
        <div class="rc-tags">
          <span class="tbadge" style="background:${ti.color}">${ti.zh}</span>
          <span class="tierpill" style="color:${tc}">${tierLabel(b.tier)}</span>
        </div>
      </div></div>`;
  }).join("");
  resultsEl.querySelectorAll(".rc").forEach(el=>{
    const open=()=>showDetail(+el.dataset.i);
    el.addEventListener("click",open);
    el.addEventListener("keydown",e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();open();}});
  });
}

/* ── 詳細卡 ── */
// 一句話總評等級
function ratingWord(b){
  const r=tierRank(b.tier);
  if(b.tier==="X") return "頂尖強勢";
  if(r>=13) return "強勢主力";      // S+ / S
  if(r>=11) return "中上可用";      // A+ / A
  if(r>=9)  return "中段穩健";      // B+ / B
  if(r>=7)  return "堪用入門";      // C+ / C
  if(r>=3)  return "偏弱後段";      // D+ ~ E
  return "天梯未列";
}

// 評價（明確寫出）
function verdict(b){
  const ti=typeInfo(b.type), tl=tierLabel(b.tier), rw=ratingWord(b), r=tierRank(b.tier);
  let s=`【${rw}】${ti.zh}型戰刃，天梯定位 ${tl}。${ti.trait}。`;
  if(b.tier==="X")      s+="目前天梯最高牌位，實戰統治力極強。";
  else if(r>=13)        s+="第一線強勢牌位，競技場常客，非常值得投入。";
  else if(r>=11)        s+="中上牌位，配置得當即具競爭力。";
  else if(r>=9)         s+="中段班，穩定可用，適合練習與休閒對戰。";
  else if(r>=7)         s+="偏入門牌位，適合新手熟悉手感。";
  else if(r>=3)         s+="天梯較後段，實戰略吃虧，建議改裝補強。";
  else                  s+="目前天梯未收錄，定位僅供參考。";
  // 原裝高階零件加分
  const hi=[];
  if(b.ratchet && b.ratchetTier && tierRank(b.ratchetTier)>=13) hi.push(`固鎖 ${b.ratchet}（${b.ratchetTier}）`);
  if(b.bit && b.bitTier && tierRank(b.bitTier)>=13) hi.push(`軸心 ${b.bit}（${b.bitTier}）`);
  if(hi.length) s+=`原裝${hi.join("、")}為高階零件，可直接沿用。`;
  return s;
}

// 建議（明確條列）
function suggestion(b){
  const out=[], r=tierRank(b.tier);
  if(b.combo) out.push(`熱門配置：${b.combo}`);
  if(b.tier==="X"||r>=13)      out.push("可作為主力直接參賽，優先投資與練習。");
  else if(r>=11)              out.push("值得培養，搭配高階固鎖／軸心可再上一階。");
  else if(r>=9)              out.push("適合日常對戰與練手，競技場前建議微調配件。");
  else if(r>=7)              out.push("適合作為練習或收藏，競技建議改裝補強。");
  else if(r>0)              out.push("實戰偏弱，建議拆件與其他強刃混搭使用。");
  else                     out.push("天梯未列，可自行測試手感再決定是否投入。");
  const lowR=b.ratchet && b.ratchetTier && tierRank(b.ratchetTier)>0 && tierRank(b.ratchetTier)<9;
  const lowB=b.bit && b.bitTier && tierRank(b.bitTier)>0 && tierRank(b.bitTier)<9;
  if(lowR) out.push(`原裝固鎖 ${b.ratchet}（${b.ratchetTier}）階級偏低，可換更高階固鎖提升表現。`);
  if(lowB) out.push(`原裝軸心 ${b.bit}（${b.bitTier}）階級偏低，可依打法更換軸心。`);
  return out;
}

/* ── 照片（個人紀錄，純本機顯示） ── */
function bindPhoto(){
  const drop=document.getElementById("drop"),
    userphoto=document.getElementById("userphoto"),
    userimg=document.getElementById("userimg"),
    removePhoto=document.getElementById("removePhoto");
  drop.addEventListener("click",()=>fileEl.click());
  drop.addEventListener("keydown",e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();fileEl.click();}});
  ["dragover","dragenter"].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add("drag");}));
  ["dragleave","drop"].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove("drag");}));
  drop.addEventListener("drop",e=>{const f=e.dataTransfer.files[0];if(f)loadPhoto(f,userimg,drop,userphoto);});
  fileEl.onchange=e=>{const f=e.target.files[0];if(f)loadPhoto(f,userimg,drop,userphoto);fileEl.value="";};
  removePhoto.addEventListener("click",()=>{
    userphoto.classList.remove("show");drop.style.display="block";userimg.src="";userPhotoSrc=null;});
}
function loadPhoto(f,userimg,drop,userphoto){
  if(!f.type.startsWith("image/")) return;
  const r=new FileReader();
  r.onload=()=>{
    const img=new Image();
    img.onload=()=>{
      // 縮圖壓縮（最長邊 800px、JPEG）以節省 localStorage 空間
      const MAX=800; let{width:w,height:h}=img;
      if(w>MAX||h>MAX){ const s=MAX/Math.max(w,h); w=Math.round(w*s); h=Math.round(h*s); }
      const cv=document.createElement("canvas"); cv.width=w; cv.height=h;
      cv.getContext("2d").drawImage(img,0,0,w,h);
      let out; try{ out=cv.toDataURL("image/jpeg",0.82); }catch(e){ out=r.result; }
      userPhotoSrc=out; userimg.src=out;
      drop.style.display="none"; userphoto.classList.add("show");
    };
    img.onerror=()=>{userPhotoSrc=r.result;userimg.src=r.result;
      drop.style.display="none";userphoto.classList.add("show");};
    img.src=r.result;
  };
  r.readAsDataURL(f);
}

/* ══════════════════════════════════════════════════
   我的最愛（localStorage）
   ══════════════════════════════════════════════════ */
const FAV_KEY="beyscan_favs";
let activeView="search";

function loadFavs(){ try{return JSON.parse(localStorage.getItem(FAV_KEY))||[];}catch(e){return [];} }
function saveFavs(a){ localStorage.setItem(FAV_KEY,JSON.stringify(a)); updateFavCount(); }
function updateFavCount(){ favCountEl.textContent="("+loadFavs().length+")"; }
function findBladeIndex(id,name){
  let i=BLADES.findIndex(b=>b.id&&b.id===id&&b.name===name);
  if(i<0) i=BLADES.findIndex(b=>b.name===name);
  return i;
}

function bindFavSave(){
  const btn=document.getElementById("addFav"), msg=document.getElementById("favMsg");
  btn.addEventListener("click",()=>{
    const b=BLADES[currentBladeIdx]; if(!b) return;
    const nick=document.getElementById("favNick").value.trim();
    const note=document.getElementById("favNote").value.trim();
    const favs=loadFavs();
    const entry={
      id: editingFavId || ("f"+Date.now()+Math.floor(Math.random()*1000)),
      bladeId:b.id||"", bladeName:b.name, type:b.type, tier:b.tier, img:b.img||"",
      nick, note, photo:userPhotoSrc||null, ts:Date.now()
    };
    if(editingFavId){
      const k=favs.findIndex(f=>f.id===editingFavId);
      if(k>=0){ entry.ts=favs[k].ts; favs[k]=entry; }
      else favs.push(entry);
    } else favs.push(entry);
    try{ saveFavs(favs); }
    catch(e){ msg.style.color="var(--atk)";
      msg.textContent="儲存失敗：本機空間可能已滿（照片太多），請刪除部分收藏。"; return; }
    msg.style.color="var(--sta)";
    msg.textContent = editingFavId ? "✓ 已更新收藏" : "♥ 已加入我的最愛";
    editingFavId=entry.id;
    btn.textContent="儲存變更";
    document.querySelector(".photo-sec h4").innerHTML="♥ 編輯我的陀螺";
  });
}

function renderFavs(){
  const favs=loadFavs().slice().sort((a,b)=>b.ts-a.ts);
  favInfoEl.textContent=favs.length+" 顆收藏 · 儲存在此裝置";
  if(!favs.length){
    favGridEl.innerHTML="";
    favEmptyEl.style.display="block";
    favEmptyEl.innerHTML="還沒有收藏。<br>到「天梯查詢」點一顆戰刃，填暱稱／照片後按 <b>♥ 加入我的最愛</b>。";
    return;
  }
  favEmptyEl.style.display="none";
  favGridEl.innerHTML=favs.map(f=>{
    const ti=typeInfo(f.type), tc=tierColor(f.tier);
    const pic=f.photo||f.img;
    const d=new Date(f.ts);
    const ds=d.getFullYear()+"/"+String(d.getMonth()+1).padStart(2,"0")+"/"+String(d.getDate()).padStart(2,"0");
    return `<div class="fc">
      <div class="fc-img">${pic?`<img src="${esc(pic)}" alt="" loading="lazy">`:""}</div>
      <div class="fc-body">
        <div class="fc-nick">${esc(f.nick||f.bladeName)}</div>
        <div class="fc-blade">${esc(f.bladeName)}${f.bladeId?` · ${esc(f.bladeId)}`:""}</div>
        <div class="fc-tags">
          <span class="tbadge" style="background:${ti.color}">${ti.zh}</span>
          <span class="tierpill" style="color:${tc}">${tierLabel(f.tier)}</span>
        </div>
        ${f.note?`<div class="fc-note">${esc(f.note)}</div>`:""}
        <div class="fc-date">收藏於 ${ds}</div>
        <div class="fc-actions">
          <button data-act="view" data-id="${f.id}">檢視</button>
          <button data-act="edit" data-id="${f.id}">編輯</button>
          <button class="del" data-act="del" data-id="${f.id}">刪除</button>
        </div>
      </div></div>`;
  }).join("");
  favGridEl.querySelectorAll("button[data-act]").forEach(btn=>{
    btn.addEventListener("click",()=>favAction(btn.dataset.act, btn.dataset.id));
  });
}

function favAction(act,id){
  const favs=loadFavs();
  const f=favs.find(x=>x.id===id); if(!f) return;
  if(act==="del"){
    if(!confirm(`確定刪除「${f.nick||f.bladeName}」？`)) return;
    saveFavs(favs.filter(x=>x.id!==id)); renderFavs(); return;
  }
  const idx=findBladeIndex(f.bladeId,f.bladeName);
  if(idx<0){ alert("找不到對應的戰刃（天梯資料可能已更新）。"); return; }
  switchView("search", true);
  showDetail(idx, act==="edit" ? f : undefined);
}

/* ── 配件天梯（固鎖 / 軸心） ── */
let activePartKind="ratchet";

// 把所有戰刃用到的固鎖／軸心彙整成一份清單（同名取最高階級，並統計採用數）
function buildParts(kind){
  const map=new Map();
  BLADES.forEach(b=>{
    const name=kind==="ratchet"?b.ratchet:b.bit;
    const tier=kind==="ratchet"?b.ratchetTier:b.bitTier;
    if(!name) return;
    if(!map.has(name)) map.set(name,{name,tier,count:0});
    const o=map.get(name);
    o.count++;
    if(tierRank(tier)>tierRank(o.tier)) o.tier=tier;
  });
  return [...map.values()];
}

// 依階級分成三個推薦等級（比照參考站：推薦購買 / 視情況 / 不推薦）
function partBucket(tier){
  const r=tierRank(tier);
  if(r>=11) return "buy";     // A 以上
  if(r>=7)  return "maybe";   // C ～ B+
  if(r>0)   return "avoid";   // E ～ D+
  return "none";              // 未列
}
const PART_BUCKETS=[
  ["buy","推薦購買","體質頂尖，值得優先購入或直接沿用"],
  ["maybe","視情況","中段實用，依打法與對手選用"],
  ["avoid","不推薦","體質偏弱，競技建議更換為高階配件"],
];

// 固鎖：由高度推斷取向（依命名規則，末段數字＝高度）
function ratchetHint(name){
  const m=/-(\d+)\b/.exec(name);
  if(!m) return "";
  const h=+m[1];
  if(h<=55) return `高度 ${h}｜極低重心，貼地攻擊取向`;
  if(h<=60) return `高度 ${h}｜低重心，攻擊／泛用主流`;
  if(h<=70) return `高度 ${h}｜中重心，泛用平衡`;
  if(h<=80) return `高度 ${h}｜中高重心，持久／上部攻擊`;
  return `高度 ${h}｜高重心，持久／防上飛`;
}
// 軸心：常見款式的取向（僅列出明確可辨識者）
const BIT_HINT={
  F:"Flat｜攻擊，強力橫移", LF:"Low Flat｜攻擊，低重心激移",
  GF:"Gear Flat｜攻擊，齒輪回充移動", N:"Needle｜持久，定點自轉",
  HN:"High Needle｜持久，高定點", MN:"Metal Needle｜持久，金屬定點",
  GN:"Gear Needle｜持久／防禦，齒輪回充", B:"Ball｜防禦，抗攻晃動",
  GB:"Gear Ball｜防禦，齒輪回充抗攻", O:"Orb｜防禦，圓弧接地",
  P:"Point｜持久／防禦，小點定位", GP:"Gear Point｜防禦，齒輪回充",
  T:"Taper｜平衡，泛用", HT:"High Taper｜平衡，高泛用", D:"Dot｜持久，極小接點",
};

function partNote(bucket,isR){
  const t=isR?"固鎖":"軸心";
  if(bucket==="buy")   return `頂尖${t}，${isR?"重心與鎖合表現優異":"性能全面均衡"}，建議優先購入並可長期沿用。`;
  if(bucket==="maybe") return `中段${t}，特定打法或對局下仍有發揮空間，可視情況選用。`;
  return `體質偏弱的${t}，競技環境較吃虧，建議更換為推薦等級的${t}。`;
}

function renderParts(){
  partKindEl.innerHTML=[["ratchet","固鎖 RATCHET"],["bit","軸心 BIT"]].map(k=>
    `<div class="chip${k[0]===activePartKind?" on":""}" data-k="${k[0]}">${k[1]}</div>`).join("");
  partKindEl.querySelectorAll(".chip").forEach(ch=>ch.addEventListener("click",()=>{
    activePartKind=ch.dataset.k; renderParts();
  }));

  const isR=activePartKind==="ratchet";
  const items=buildParts(activePartKind)
    .filter(o=>partBucket(o.tier)!=="none")
    .sort((a,b)=>tierRank(b.tier)-tierRank(a.tier)||b.count-a.count);

  partsInfoEl.textContent=`${isR?"固鎖":"軸心"} · 共 ${items.length} 種 · 依天梯排序`;

  partsBodyEl.innerHTML=PART_BUCKETS.map(([key,label,desc])=>{
    const group=items.filter(o=>partBucket(o.tier)===key);
    if(!group.length) return "";
    return `<div class="pgroup pg-${key}">
      <div class="pg-head"><span class="pg-title">${label}（${group.length}）</span><span class="pg-desc">${desc}</span></div>
      <div class="results">${group.map(o=>{
        const hint=isR?ratchetHint(o.name):(BIT_HINT[o.name]||"");
        return `<div class="pc">
          <div class="pc-head">
            <span class="pc-name">${esc(o.name)}</span>
            <span class="tierpill" style="color:${tierColor(o.tier)}">${tierLabel(o.tier)}</span>
          </div>
          ${hint?`<div class="pc-hint">${esc(hint)}</div>`:""}
          <div class="pc-note">${esc(partNote(key,isR))}</div>
          <div class="pc-count">${o.count} 款戰刃採用</div>
        </div>`;
      }).join("")}</div>
    </div>`;
  }).join("");
}

/* ── 分頁切換 ── */
function switchView(v, keepDetail){
  activeView=v;
  searchViewEl.style.display=v==="search"?"block":"none";
  partsViewEl.style.display=v==="parts"?"block":"none";
  favViewEl.style.display=v==="favs"?"block":"none";
  tabSearch.classList.toggle("on",v==="search");
  tabParts.classList.toggle("on",v==="parts");
  tabFavs.classList.toggle("on",v==="favs");
  if(!keepDetail){ detailEl.classList.remove("show"); detailEl.innerHTML=""; document.body.classList.remove("modal-open"); editingFavId=null; }
  if(v==="favs") renderFavs();
  if(v==="parts") renderParts();
}
tabSearch.addEventListener("click",()=>switchView("search"));
tabParts.addEventListener("click",()=>switchView("parts"));
tabFavs.addEventListener("click",()=>switchView("favs"));

/* ── init ── */
updateFavCount();
render();
</script>
